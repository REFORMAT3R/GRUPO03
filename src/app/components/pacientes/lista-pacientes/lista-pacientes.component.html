<h2>Lista de Pacientes</h2>
<table border="1">
  <tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Apellido</th>
    <th>DNI</th>
    <th>Teléfono</th>
    <th>Acciones</th>
  </tr>
  <tr *ngFor="let p of pacientes">
    <td>{{ p.id }}</td>
    <td>{{ p.nombre }}</td>
    <td>{{ p.apellido }}</td>
    <td>{{ p.dni }}</td>
    <td>{{ p.telefono }}</td>
    <td>
      <button (click)="editarPaciente(p)">Editar</button>
      <button (click)="eliminarPaciente(p.id!)">Eliminar</button>
    </td>
  </tr>
</table>
