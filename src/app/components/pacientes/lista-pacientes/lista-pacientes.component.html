<div class="card shadow-sm border-0">
  <!-- Cabecera de la tarjeta con estilo clínico -->
  <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
    <h5 class="mb-0 fw-bold">Registro General de Pacientes - Moisés Heresi</h5>
    <a class="btn btn-light btn-sm fw-bold shadow-sm" routerLink="/pacientes/nuevo">+ Nuevo Paciente</a>
  </div>
  
  <!-- Cuerpo de la tarjeta con la tabla responsiva -->
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>DNI</th>
            <th>Teléfono</th>
            <th class="text-center pe-4">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Recorremos la lista de pacientes de tu amigo -->
          <tr *ngFor="let p of pacientes">
            <td class="ps-4 fw-bold text-secondary">{{ p.id }}</td>
            <td class="fw-semibold text-dark">{{ p.nombre }}</td>
            <td>{{ p.apellido }}</td>
            <td><span class="badge bg-secondary px-2 py-1.5 font-monospace">{{ p.dni }}</span></td>
            <td>{{ p.telefono || 'Sin registrar' }}</td>
            <td class="text-center pe-4">
              <!-- Botones con estilos e iconos de Bootstrap -->
              <button class="btn btn-outline-warning btn-sm me-2 shadow-xs" (click)="editarPaciente(p)">
                Editar
              </button>
              <button class="btn btn-outline-danger btn-sm shadow-xs" (click)="eliminarPaciente(p.id!)">
                Eliminar
              </button>
            </td>
          </tr>
          
          <!-- Mensaje por si la lista viene vacía de Django -->
          <tr *ngIf="pacientes.length === 0">
            <td colspan="6" class="text-center py-4 text-muted">
              No hay pacientes registrados en el sistema de la clínica.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
