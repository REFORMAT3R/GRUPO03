<div class="card shadow-sm border-0">
  <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
    <h5 class="mb-0 fw-bold">Agenda de Citas Médicas - Moisés Heresi</h5>
    <a class="btn btn-light btn-sm fw-bold shadow-sm" routerLink="/citas/nueva">+ Agendar Cita</a>
  </div>
  
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">ID</th>
            <th>Paciente (ID)</th>
            <th>Fecha y Hora</th>
            <th>Motivo / Especialidad</th>
            <th class="text-center pe-4">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of citas">
            <td class="ps-4 fw-bold text-secondary">{{ c.id }}</td>
            <td class="fw-semibold text-dark">{{ c.paciente }}</td>
            <td><span class="badge bg-light text-dark border py-1.5 font-monospace">{{ c.fecha }}</span></td>
            <td>{{ c.motivo || 'Consulta General' }}</td>
            <td class="text-center pe-4">
              <button class="btn btn-outline-warning btn-sm me-2 shadow-xs" (click)="editarCita(c)">
                Editar
              </button>
              <button class="btn btn-outline-danger btn-sm shadow-xs" (click)="c.id && eliminarCita(c.id)">
                Cancelar
              </button>
            </td>
          </tr>
          
          <tr *ngIf="citas.length === 0">
            <td colspan="5" class="text-center py-4 text-muted">
              No hay citas médicas programadas en el sistema.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
