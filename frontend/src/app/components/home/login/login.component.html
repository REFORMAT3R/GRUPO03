<div class="login-container">

  <h2>Iniciar Sesión</h2>


  <form (ngSubmit)="iniciarSesion()">


    <label>
      Usuario
    </label>

    <input
      type="text"
      [(ngModel)]="username"
      name="username"
      required
    >



    <label>
      Contraseña
    </label>


    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
    >



    <button type="submit">
      Ingresar
    </button>


    <p *ngIf="error">
      {{error}}
    </p>


  </form>


</div>
