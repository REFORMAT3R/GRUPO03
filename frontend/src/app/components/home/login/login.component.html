<div class="login-container">

  <div class="login-card">

    <div class="login-header">

      <h2>Iniciar Sesión</h2>

      <p>Ingrese sus credenciales para acceder al sistema.</p>

    </div>

    <form
      class="login-form"
      (ngSubmit)="iniciarSesion()">

      <div class="campo">

        <label>Usuario</label>

        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Ingrese su usuario"
          required>

      </div>

      <div class="campo">

        <label>Contraseña</label>

        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingrese su contraseña"
          required>

      </div>

      <button
        class="btn-login"
        type="submit">

        Ingresar

      </button>

      <p
        class="mensaje-error"
        *ngIf="error">

        {{ error }}

      </p>

    </form>

  </div>

</div>
