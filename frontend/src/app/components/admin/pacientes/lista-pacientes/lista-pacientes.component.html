<div class="tarjeta-clinica">
  <div class="cabecera-tabla">
    <h3>Registro de Pacientes - Moisés Heresi</h3>
    <a class="btn btn-nuevo" routerLink="/admin/pacientes/nuevo">+ Nuevo Paciente</a>
  </div>
  
  <table class="tabla-datos">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombres</th>
        <th>Apellidos</th>
        <th>DNI</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of pacientes">
        <td>{{ p.id }}</td>
        <td style="font-weight: bold;">{{ p.nombres }}</td>
        <td>{{ p.apellidos }}</td>
        <td>{{ p.dni }}</td>
        <td>{{ p.telefono || 'Sin registrar' }}</td>
        <td>
          <button class="btn btn-editar" (click)="editarPaciente(p)">Editar</button>
          <button class="btn btn-eliminar" (click)="eliminarPaciente(p.id!)">Eliminar</button>
        </td>
      </tr>
      <tr *ngIf="pacientes.length === 0">
        <td colspan="6" style="text-align: center; padding: 20px; color: #777;">
          No hay pacientes registrados en el sistema.
        </td>
      </tr>
    </tbody>
  </table>
</div>
