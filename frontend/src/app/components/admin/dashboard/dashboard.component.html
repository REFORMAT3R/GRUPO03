<div class="dashboard">


  <div class="cabecera">

    <h1>
      Panel Administrativo
    </h1>

    <p>
      Gestión general de la clínica
    </p>

  </div>



  <div class="tarjetas">


    <div
      class="tarjeta"
      *ngFor="let item of tarjetas"
    >


      <div class="icono">
        {{item.icono}}
      </div>


      <h3>
        {{item.titulo}}
      </h3>


      <p>
        {{item.descripcion}}
      </p>


      <a
        [routerLink]="item.ruta"
        class="boton"
      >
        Ir a módulo
      </a>


    </div>


  </div>


</div>
